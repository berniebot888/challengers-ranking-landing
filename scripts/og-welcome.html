<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OG Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 0; }
  .og {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #C8451C 0%, #A8381A 100%);
    color: #FAF7F2;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    box-sizing: border-box;
  }
  /* Subtle background pattern: huge circle on the right for visual interest */
  .og::before {
    content: '';
    position: absolute;
    top: -250px; right: -250px;
    width: 600px; height: 600px;
    background: rgba(232, 176, 76, 0.15);
    border-radius: 50%;
  }
  .og::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: rgba(26, 26, 46, 0.18);
    border-radius: 50%;
  }
  .badge {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(250, 247, 242, 0.10);
    border: 3px solid rgba(250, 247, 242, 0.30);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }
  .badge svg { width: 70px; height: 70px; }
  .eyebrow {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #E8B04C;
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }
  h1 {
    font-size: 110px;
    font-weight: 900;
    margin: 0;
    line-height: 1;
    letter-spacing: -0.02em;
    text-shadow: 0 6px 20px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }
  .subtitle {
    font-size: 30px;
    font-weight: 600;
    margin-top: 24px;
    max-width: 800px;
    text-align: center;
    line-height: 1.3;
    opacity: 0.92;
    position: relative;
    z-index: 1;
  }
  .footer-row {
    position: absolute;
    bottom: 36px; left: 60px; right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 22px;
    font-weight: 600;
    opacity: 0.78;
    z-index: 1;
  }
  .footer-row .url {
    background: rgba(0,0,0,0.20);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 20px;
  }
  .footer-row .brand {
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="og">
  <div class="badge">
    <!-- Challengers Ranking brand mark -->
    <svg viewBox="0 0 400 400">
      <g fill="#FAF7F2">
        <rect x="101" y="240" width="42" height="70" rx="5"/>
        <rect x="153" y="205" width="42" height="105" rx="5"/>
        <rect x="205" y="165" width="42" height="145" rx="5"/>
        <rect x="257" y="120" width="42" height="190" rx="5"/>
      </g>
      <circle cx="278" cy="92" r="22" fill="#FAF7F2"/>
    </svg>
  </div>
  <div class="eyebrow">CHALLENGERS RANKING</div>
  <h1>¡Bienvenido!</h1>
  <div class="subtitle">Tour rápido por las reglas del ranking de tu club</div>
  <div class="footer-row">
    <span class="brand">Tour de bienvenida</span>
    <span class="url">challengersranking.online/welcome</span>
  </div>
</div>
</body>
</html>
